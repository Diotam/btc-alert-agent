name: BTC 30m Signal Alerts

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes - the 5m trigger phase needs this cadence
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email instead of a market check"
        type: boolean
        default: false

permissions:
  contents: write   # lets the workflow commit the signal-state file

concurrency:
  group: btc-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Run signal check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ inputs.test_email }}" = "true" ]; then
            python3 btc_alert_agent.py --test
          else
            python3 btc_alert_agent.py
          fi

      - name: Save signal state
        run: |
          git config user.name "btc-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add btc_agent_state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            MSG="$(head -c 100 run_summary.txt 2>/dev/null || echo 'state update')"
            git commit -m "$MSG"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
